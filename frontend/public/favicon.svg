<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Flame glow -->
  <defs>
    <radialGradient id="flameGlow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ff9500" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff9500" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flameGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="50%" stop-color="#ff9500"/>
      <stop offset="100%" stop-color="#ffcc00"/>
    </linearGradient>
    <linearGradient id="candleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5f0e6"/>
      <stop offset="50%" stop-color="#fff8e7"/>
      <stop offset="100%" stop-color="#e8e0d0"/>
    </linearGradient>
  </defs>

  <!-- Glow effect -->
  <circle cx="24" cy="14" r="16" fill="url(#flameGlow)"/>

  <!-- Flame outer -->
  <path d="M24 4 C20 10, 16 14, 18 20 C19 23, 22 24, 24 24 C26 24, 29 23, 30 20 C32 14, 28 10, 24 4 Z" fill="url(#flameGrad)"/>

  <!-- Flame inner (bright core) -->
  <path d="M24 10 C22 14, 20 16, 21 19 C21.5 21, 23 22, 24 22 C25 22, 26.5 21, 27 19 C28 16, 26 14, 24 10 Z" fill="#fff8dc" opacity="0.9"/>

  <!-- Wick -->
  <rect x="23" y="22" width="2" height="4" fill="#333"/>

  <!-- Candle body -->
  <rect x="18" y="26" width="12" height="18" rx="1" fill="url(#candleGrad)" stroke="#d4c4a8" stroke-width="0.5"/>

  <!-- Wax drip -->
  <ellipse cx="20" cy="30" rx="1.5" ry="2" fill="#fff8e7"/>
  <ellipse cx="27" cy="32" rx="1" ry="1.5" fill="#fff8e7"/>
</svg>
