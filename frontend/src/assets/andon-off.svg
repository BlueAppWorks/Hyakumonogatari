<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 110">
  <!-- Paper shade - trapezoidal shape, cold and dark -->
  <path d="M18 20 L12 80 L58 80 L52 20 Z" fill="url(#andonPaperDark)"/>

  <!-- Subtle paper texture - faint vertical lines -->
  <line x1="22" y1="22" x2="16" y2="78" stroke="rgba(0,0,0,0.05)" stroke-width="0.5"/>
  <line x1="30" y1="21" x2="26" y2="79" stroke="rgba(0,0,0,0.05)" stroke-width="0.5"/>
  <line x1="40" y1="21" x2="44" y2="79" stroke="rgba(0,0,0,0.05)" stroke-width="0.5"/>
  <line x1="48" y1="22" x2="54" y2="78" stroke="rgba(0,0,0,0.05)" stroke-width="0.5"/>

  <!-- Black wooden frame - top -->
  <path d="M16 18 L54 18 L52 22 L18 22 Z" fill="url(#darkWoodOff)"/>
  <line x1="16" y1="18" x2="54" y2="18" stroke="#111" stroke-width="1"/>

  <!-- Black wooden frame - bottom -->
  <path d="M10 78 L60 78 L58 82 L12 82 Z" fill="url(#darkWoodOff)"/>
  <line x1="10" y1="82" x2="60" y2="82" stroke="#111" stroke-width="1"/>

  <!-- Frame corners/edges - left -->
  <path d="M16 18 L18 22 L12 82 L10 78 Z" fill="url(#darkWoodOff)" stroke="#111" stroke-width="0.5"/>

  <!-- Frame corners/edges - right -->
  <path d="M54 18 L52 22 L58 82 L60 78 Z" fill="url(#darkWoodOff)" stroke="#111" stroke-width="0.5"/>

  <!-- Legs - left -->
  <path d="M14 82 L10 104 L16 104 L18 82" fill="url(#darkWoodOff)" stroke="#111" stroke-width="0.5"/>

  <!-- Legs - right -->
  <path d="M56 82 L60 104 L54 104 L52 82" fill="url(#darkWoodOff)" stroke="#111" stroke-width="0.5"/>

  <!-- Cross bar between legs -->
  <rect x="16" y="92" width="38" height="3" rx="0.5" fill="url(#darkWoodOff)" stroke="#111" stroke-width="0.5"/>

  <!-- Feet -->
  <ellipse cx="13" cy="105" rx="4" ry="2" fill="#111"/>
  <ellipse cx="57" cy="105" rx="4" ry="2" fill="#111"/>

  <!-- Faint smoke wisps -->
  <g opacity="0.25">
    <ellipse cx="35" cy="30" rx="4" ry="6" fill="#666">
      <animate attributeName="cy" values="30;20;10" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.1;0" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="32" cy="35" rx="3" ry="5" fill="#666">
      <animate attributeName="cy" values="35;25;15" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.08;0" dur="3.5s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="38" cy="32" rx="3" ry="4" fill="#666">
      <animate attributeName="cy" values="32;22;12" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.08;0" dur="3.2s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Dark center where flame was -->
  <ellipse cx="35" cy="50" rx="8" ry="10" fill="rgba(0,0,0,0.1)"/>

  <defs>
    <!-- Cold dark paper -->
    <linearGradient id="andonPaperDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8a8478"/>
      <stop offset="30%" style="stop-color:#9a9488"/>
      <stop offset="50%" style="stop-color:#a09890"/>
      <stop offset="70%" style="stop-color:#9a9488"/>
      <stop offset="100%" style="stop-color:#807870"/>
    </linearGradient>

    <!-- Dark wood frame -->
    <linearGradient id="darkWoodOff" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#222"/>
      <stop offset="50%" style="stop-color:#111"/>
      <stop offset="100%" style="stop-color:#222"/>
    </linearGradient>
  </defs>
</svg>
