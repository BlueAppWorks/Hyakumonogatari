<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 100">
  <!-- Smoke -->
  <g opacity="0.4">
    <ellipse cx="30" cy="15" rx="4" ry="6" fill="#888">
      <animate attributeName="cy" values="15;5;-5" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.2;0" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="26" cy="20" rx="3" ry="5" fill="#888">
      <animate attributeName="cy" values="20;10;0" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.15;0" dur="2.5s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="34" cy="18" rx="3" ry="4" fill="#888">
      <animate attributeName="cy" values="18;8;-2" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.15;0" dur="2.2s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Wick (burnt) -->
  <path d="M28 32 Q30 28 32 32 L32 40 L28 40 Z" fill="#222"/>
  <ellipse cx="30" cy="30" rx="2" ry="2" fill="#ff3300" opacity="0.3"/>

  <!-- Candle body (slightly darker/cooler) -->
  <rect x="18" y="40" width="24" height="55" rx="2" fill="url(#candleGradientOff)"/>

  <!-- Candle highlight (dimmer) -->
  <rect x="20" y="42" width="6" height="50" rx="1" fill="rgba(255,255,255,0.15)"/>

  <!-- Dripping wax -->
  <ellipse cx="22" cy="60" rx="3" ry="5" fill="#e5d6c3"/>
  <ellipse cx="38" cy="70" rx="2" ry="4" fill="#e5d6c3"/>

  <!-- Base -->
  <ellipse cx="30" cy="95" rx="18" ry="4" fill="#6b3513"/>

  <!-- Gradients -->
  <defs>
    <linearGradient id="candleGradientOff" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8dcc8"/>
      <stop offset="50%" style="stop-color:#e5d9bd"/>
      <stop offset="100%" style="stop-color:#d5c6b3"/>
    </linearGradient>
  </defs>
</svg>
